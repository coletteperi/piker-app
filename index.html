const IconTrash     = (p) => <Icon {...p} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></>} />;

const IconChart     = (p) => <Icon {...p} d={<><line x1="3" y1="3" x2="3" y2="21"/><line x1="3" y1="21" x2="21" y2="21"/><polyline points="7 14 11 10 14 13 20 6"/></>} />;
const IconSun       = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M5 5l1.5 1.5"/><path d="M17.5 17.5L19 19"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M5 19l1.5-1.5"/><path d="M17.5 6.5L19 5"/></>} />;
const IconLeaf      = (p) => <Icon {...p} d={<><path d="M11 20A7 7 0 0 1 4 13c0-5 4-9 9-9a9 9 0 0 1 8 8c0 4-3 8-7 8z"/><path d="M2 22s2-4 9-7"/></>} />;
const IconHeart     = (p) => <Icon {...p} d={<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>} />;

const ICONS = {
  activity: IconActivity, waves: IconWaves, mountain: IconMountain, wind: IconWind,
  coffee: IconCoffee, book: IconBook, moon: IconMoon, sun: IconSun, leaf: IconLeaf, heart: IconHeart,
};
const ICON_CHOICES = Object.keys(ICONS);

/* ---------- Date helpers ---------- */
function startOfWeek(date = new Date()) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return d;
}
function fmtMonthDay(d) { return d.toLocaleDateString("en-US", { month:"short", day:"numeric" }); }
function weekKey(date) { return startOfWeek(date).toISOString().slice(0,10); }
function shiftWeek(wkKey, byDays) {
  const d = new Date(wkKey + "T00:00:00");
  d.setDate(d.getDate() + byDays);
  return weekKey(d);
}
function buildDaysForWeek(weekStart) {
  return DAY_NAMES.map((name, i) => {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    return { name, date: fmtMonthDay(d), iso: d.toISOString().slice(0,10) };
  });
}

/* ---------- Color tokens ---------- */
const C = {
  bgTop:   "#fffaf0",
  bgBot:   "#fff3df",
  card:    "#fffdf7",
  ink:     "#2d2418",
  inkSoft: "#5d4e35",
  muted:   "#8a7a5c",
  line:    "#f0e4cc",
  rule:    "#e6d8b8",
  yellow:  "#f5c518",
  yellowSoft: "#fff1bf",
  sage:    "#7a9670",
  sageSoft:"#dde7d6",
  sky:     "#5b8db8",
  skySoft: "#d6e5f1",
  orange:  "#e8804a",
  orangeSoft: "#fadcc7",
  coral:   "#e88a82",
  coralSoft:"#fbdcd8",
};
const ACCENTS = {
  sage:   { solid: C.sage,   soft: C.sageSoft,   onSolid: "#fffdf7" },
  orange: { solid: C.orange, soft: C.orangeSoft, onSolid: "#fffdf7" },
  sky:    { solid: C.sky,    soft: C.skySoft,    onSolid: "#fffdf7" },
  coral:  { solid: C.coral,  soft: C.coralSoft,  onSolid: "#fffdf7" },
  yellow: { solid: C.yellow, soft: C.yellowSoft, onSolid: "#2d2418" },
  ink:    { solid: C.ink,    soft: "#e8e3d5",    onSolid: "#fffdf7" },
};
const ACCENT_KEYS = ["sage","orange","sky","coral","yellow"];
function accentOf(cat) { return ACCENTS[cat?.accent] || ACCENTS.sage; }

/* ---------- Defaults ---------- */
function defaultCategories() {
  return [
    {
      id: "movement", name: "Movement", type: "movement",
      subtitle: "5+ days a week, however feels good",
      accent: "sage",
      perDay: [
        { label: "Beach walk",        icon: "waves" },
        { label: "Pilates class",     icon: "activity" },
        { label: "Hike",              icon: "mountain" },
        { label: "Rest or easy walk", icon: "wind" },
        { label: "Pilates or run",    icon: "activity" },
        { label: "Beach walk",        icon: "waves" },
        { label: "Long hike or run",  icon: "mountain" },
      ],
    },
    {
      id: "fruitveg", name: "Fruit & Veg", type: "slots",
      subtitle: "Fruit at breakfast, veg at lunch, veg at dinner.",
      accent: "orange",
      slotHeaders: ["breakfast", "lunch", "dinner"],
      slots: ["fruit", "veg", "veg"],
    },
    {
      id: "water", name: "Water", type: "water",
      subtitle: "Half your weight in ounces. That's the rule.",
      accent: "sky",
      weightLbs: 150, bottleOz: 24,
    },
    {
      id: "reading", name: "Read 5 Min", type: "check",
      subtitle: "Just five minutes. Quiets the mind.",
      accent: "yellow",
      icon: "book",
    },
    {
      id: "phone", name: "Phone Away @ 9pm", type: "check",
      subtitle: "Down by 9pm. Better sleep, better mornings.",
      accent: "ink",
      icon: "moon",
    },
  ];
}

function defaultDataFor(cat) {
  switch (cat.type) {
    case "movement":
    case "check":   return { values: Array(7).fill(false) };
    case "slots":   return { values: Array(7).fill(0).map(() => cat.slots.map(() => false)) };
    case "water":   return { values: Array(7).fill(0) };
    case "counter": return { values: Array(7).fill(0) };
    default:        return { values: Array(7).fill(null) };
  }
}

function ensureWeek(store, wk) {
  if (!store.weeks[wk]) {
    store.weeks[wk] = {};
    for (const c of store.categories) store.weeks[wk][c.id] = defaultDataFor(c);
  } else {
    for (const c of store.categories) {
      if (!store.weeks[wk][c.id]) store.weeks[wk][c.id] = defaultDataFor(c);
    }
  }
  return store;
}

function defaultStore() {
  const cats = defaultCategories();
  const wk = weekKey(new Date());
  const data = {};
  for (const c of cats) data[c.id] = defaultDataFor(c);
  return { categories: cats, weeks: { [wk]: data } };
}

function loadStore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultStore();
    const s = JSON.parse(raw);
    if (!s.categories || !s.weeks) return defaultStore();
    for (const c of s.categories) {
      if (!c.accent) c.accent = ACCENT_KEYS[Math.floor(Math.random()*ACCENT_KEYS.length)];
    }
    return ensureWeek(s, weekKey(new Date()));
  } catch (e) {
    return defaultStore();
  }
}

function saveStore(store) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); } catch (e) {}
}

/* =================== APP =================== */
function App() {
  const [store, setStore] = useState(null);
  const [view, setView]   = useState("home"); // home | settings | category-edit | stats
  const [editingId, setEditingId] = useState(null);
  const [viewingWeek, setViewingWeek] = useState(weekKey(new Date()));
  const realCurrentWeek = weekKey(new Date());

  useEffect(() => { setStore(loadStore()); }, []);
  useEffect(() => { if (store) saveStore(store); }, [store]);

  if (!store) return (
    <div style={{ minHeight:"100vh", background:C.bgTop, display:"flex", alignItems:"center",
                  justifyContent:"center", color:C.ink }}>
      <span className="hand" style={{ fontSize:32, color:C.sage }}>loading your week…</span>
    </div>
  );

  const data = store.weeks[viewingWeek] || {};
  const days = buildDaysForWeek(new Date(viewingWeek + "T00:00:00"));

  const goToWeek = (wk) => {
    setStore(s => {
      const next = { ...s, weeks: { ...s.weeks } };
      ensureWeek(next, wk);
      return next;
    });
    setViewingWeek(wk);
  };

  const updateData = (catId, fn) => {
    setStore(s => {
      const next = { ...s, weeks: { ...s.weeks } };
      ensureWeek(next, viewingWeek);
      next.weeks[viewingWeek] = { ...next.weeks[viewingWeek] };
      next.weeks[viewingWeek][catId] = fn(next.weeks[viewingWeek][catId]);
      return next;
    });
  };
  const updateCategories = (fn) => {
    setStore(s => {
      const cats = fn(s.categories);
      const wkData = { ...s.weeks[viewingWeek] };
      for (const c of cats) if (!wkData[c.id]) wkData[c.id] = defaultDataFor(c);
      for (const id of Object.keys(wkData)) {
        if (!cats.find(c => c.id === id)) delete wkData[id];
      }
      return { ...s, categories: cats, weeks: { ...s.weeks, [viewingWeek]: wkData } };
    });
  };

  const resetWeek = () => {
    if (!confirm("Wipe this week clean and start fresh?")) return;
    setStore(s => {
      const fresh = {};
      for (const c of s.categories) fresh[c.id] = defaultDataFor(c);
      return { ...s, weeks: { ...s.weeks, [viewingWeek]: fresh } };
    });
  };

  if (view === "settings") {
    return <Settings store={store} updateCategories={updateCategories}
                     onBack={() => setView("home")}
                     onEdit={(id) => { setEditingId(id); setView("category-edit"); }} />;
  }
  if (view === "category-edit") {
    return <CategoryEditor store={store} catId={editingId}
                           updateCategories={updateCategories}
                           onBack={() => setView("settings")} />;
  }
  if (view === "stats") {
    return <Stats store={store} onBack={() => setView("home")} realCurrentWeek={realCurrentWeek}/>;
  }
  return <Home store={store} days={days} data={data}
               viewingWeek={viewingWeek} realCurrentWeek={realCurrentWeek}
               goToWeek={goToWeek}
               updateData={updateData}
               onSettings={() => setView("settings")}
               onStats={() => setView("stats")}
               onReset={resetWeek} />;
}

/* =================== HOME =================== */
function Home({ store, days, data, viewingWeek, realCurrentWeek, goToWeek,
                updateData, onSettings, onStats, onReset }) {
  const cats = store.categories;
  const weekRangeLabel = `${days[0].date} — ${days[6].date}`;
  const isCurrent = viewingWeek === realCurrentWeek;
  const isFuture  = viewingWeek > realCurrentWeek;

  const goPrev = () => goToWeek(shiftWeek(viewingWeek, -7));
  const goNext = () => { if (!isCurrent && !isFuture) goToWeek(shiftWeek(viewingWeek, 7)); };

  return (
    <Page>
      <div style={{ maxWidth:640, margin:"0 auto" }}>
        <header style={{ textAlign:"center", marginBottom:20, position:"relative" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
            <button onClick={onStats} style={iconBtn()} title="Stats">
              <IconChart size={16} color={C.muted}/>
            </button>
            <div style={{ flex:1 }}/>
            <button onClick={onSettings} style={iconBtn()} title="Edit">
              <IconSettings size={16} color={C.muted}/>
            </button>
          </div>

          <h1 className="hand" style={{ fontSize:78, fontWeight:700, margin:0, color:C.ink, lineHeight:0.9 }}>
            Piker
          </h1>
          <div style={{ fontSize:13, color:C.muted, marginTop:6, fontStyle:"italic" }}>
            your week of little wins
          </div>
          <div style={{ display:"flex", justifyContent:"center", gap:6, marginTop:12 }}>
            <Dot color={C.yellow} /><Dot color={C.sage} /><Dot color={C.sky} /><Dot color={C.orange} /><Dot color={C.coral} />
          </div>

          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginTop:18 }}>
            <button onClick={goPrev} style={iconBtn()} title="Previous week">
              <IconChevL size={16} color={C.ink}/>
            </button>
            <div style={{ minWidth:170, textAlign:"center" }}>
              <div style={{ fontSize:11, letterSpacing:3, textTransform:"uppercase", color:C.muted, fontWeight:600 }}>
                {isCurrent ? "this week" : (viewingWeek < realCurrentWeek ? "looking back" : "ahead")}
              </div>
              <div style={{ fontSize:14, color:C.ink, marginTop:2, fontWeight:500 }}>
                {weekRangeLabel}
              </div>
            </div>
            <button onClick={goNext} disabled={isCurrent || isFuture}
                    style={{ ...iconBtn(), opacity: (isCurrent||isFuture) ? 0.3 : 1, cursor:(isCurrent||isFuture)?"default":"pointer" }}
                    title={isCurrent ? "Already on this week" : "Next week"}>
              <IconChevR size={16} color={C.ink}/>
            </button>
          </div>
        </header>

        {cats.map((cat) => (
          <CategoryCard key={cat.id} cat={cat} days={days}
                        data={data[cat.id] || defaultDataFor(cat)}
                        update={(fn) => updateData(cat.id, fn)} />
        ))}

        <div style={{ textAlign:"center", marginTop:32 }}>
          <button onClick={onReset} style={{
            background:"transparent", border:"none", color:C.muted, fontSize:12, cursor:"pointer",
            display:"inline-flex", alignItems:"center", gap:6, letterSpacing:1, textTransform:"uppercase",
          }}>
            <IconReset size={12} color={C.muted}/> Reset this week
          </button>
        </div>

        <div style={{ textAlign:"center", marginTop:18, fontSize:11, color:C.muted, fontStyle:"italic" }}>
          Saves automatically. No signup, no nothing.
        </div>

        <Footer />
      </div>
    </Page>
  );
}

function Dot({ color }) {
  return <span style={{ width:10, height:10, borderRadius:"50%", background:color, display:"inline-block" }} />;
}

function Footer() {
  return (
    <div style={{ textAlign:"center", marginTop:36, paddingTop:24, borderTop:"1px solid "+C.line,
                  fontSize:12, color:C.muted, fontStyle:"italic" }}>
      made with love by{" "}
      <a href="https://coletteperi.com" target="_blank" rel="noopener noreferrer"
         style={{ color:C.sage, textDecoration:"underline", fontWeight:500 }}>
        coco peri
      </a>{" "}✨
    </div>
  );
}

/* =================== CATEGORY CARDS =================== */
function CategoryCard({ cat, days, data, update }) {
  if (cat.type === "movement") return <MovementCard cat={cat} days={days} data={data} update={update} />;
  if (cat.type === "slots")    return <SlotsCard    cat={cat} days={days} data={data} update={update} />;
  if (cat.type === "water")    return <WaterCard    cat={cat} days={days} data={data} update={update} />;
  if (cat.type === "counter")  return <CounterCard  cat={cat} days={days} data={data} update={update} />;
  if (cat.type === "check")    return <CheckCard    cat={cat} days={days} data={data} update={update} />;
  return null;
}

function Section({ title, subtitle, accent, children }) {
  const a = accent || ACCENTS.sage;
  return (
    <div style={{ marginBottom:24, background:C.card, borderRadius:14,
                  border:"1px solid "+C.line, overflow:"hidden",
                  boxShadow:"0 1px 0 rgba(0,0,0,0.02)" }}>
      <div style={{ height:6, background:a.solid }} />
      <div style={{ padding:"16px 16px 14px", borderBottom:"1px solid "+C.line,
                    display:"flex", justifyContent:"space-between", alignItems:"center", gap:8,
                    background: a.soft }}>
        <h2 style={{ margin:0, fontSize:16, fontWeight:600, color:C.ink, letterSpacing:"-0.2px" }}>{title}</h2>
        <span style={{ fontSize:11, color:C.inkSoft, letterSpacing:1, textTransform:"uppercase", textAlign:"right", fontWeight:600 }}>{subtitle}</span>
      </div>
      {children}
    </div>
  );
}

function Circle({ done, accent }) {
  const a = accent || ACCENTS.sage;
  return (
    <div style={{ width:24, height:24, borderRadius:"50%",
                  border:"1.5px solid "+(done ? a.solid : C.muted),
                  background: done ? a.solid : "transparent",
                  display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
      {done && <IconCheck size={14} color={a.onSolid} stroke={3} />}
    </div>
  );
}

function MovementCard({ cat, days, data, update }) {
  const v = data.values;
  const a = accentOf(cat);
  const count = v.filter(Boolean).length;
  const toggle = (i) => update(d => {
    const nv = [...d.values]; nv[i] = !nv[i]; return { ...d, values: nv };
  });
  return (
    <Section title={cat.name} subtitle={`${count} / 7 days`} accent={a}>
      {days.map((d, i) => {
        const dayCfg = cat.perDay[i] || { label:"Move", icon:"activity" };
        const IconC = ICONS[dayCfg.icon] || IconActivity;
        const done = v[i];
        return (
          <div key={i} onClick={() => toggle(i)}
               style={{ display:"flex", alignItems:"center", gap:14, padding:"14px 16px",
                        borderBottom: i === 6 ? "none" : "1px solid "+C.line,
                        cursor:"pointer", opacity: done ? 0.55 : 1, transition:"opacity 0.2s" }}>
            <Circle done={done} accent={a}/>
            <IconC size={18} color={a.solid} />
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:14, fontWeight:600, textDecoration: done ? "line-through" : "none" }}>
                {d.name} <span style={{ color:C.muted, fontWeight:400 }}>· {d.date}</span>
              </div>
              <div style={{ fontSize:13, color:C.inkSoft, marginTop:2 }}>{dayCfg.label}</div>
            </div>
          </div>
        );
      })}
    </Section>
  );
}

function SlotsCard({ cat, days, data, update }) {

  const toggle = (di, si) => update(d => {

    nv[di][si] = !nv[di][si];
    return { ...d, values: nv };

  return (
    <Section title={cat.name} subtitle={`${perfect} / 7 perfect days`} accent={a}>

          <div style={{ fontSize:13, color:C.inkSoft, marginBottom:12, fontStyle:"italic" }}>
            {cat.subtitle}
          </div>
        )}
        {days.map((d, i) => {
          const day = Array.isArray(v[i]) ? v[i] : cat.slots.map(() => false);
          const allDone = day.length === cat.slots.length && day.every(Boolean);

              </div>

                <div style={{ display:"flex", gap:6, marginBottom:4 }}>

function WaterCard({ cat, days, data, update }) {
  const a = accentOf(cat);
  const goalOz = Math.max(1, Math.round((cat.weightLbs || 0) / 2));
  const bottleOz = Math.max(1, cat.bottleOz || 1);
  const bottlesGoal = Math.max(1, Math.ceil(goalOz / bottleOz));
  const v = data.values;
  const hitDays = v.filter(b => b >= bottlesGoal).length;
  const setN = (i, n) => update(d => {
    const nv = [...d.values]; nv[i] = Math.max(0, Math.min(bottlesGoal + 2, n));
    return { ...d, values: nv };
  });
  return (
    <Section title={cat.name} subtitle={`${bottlesGoal} × ${bottleOz}oz = ${bottlesGoal*bottleOz}oz / day`} accent={a}>
      <div style={{ padding:"8px 16px 16px" }}>
        <div style={{ fontSize:13, color:C.inkSoft, marginBottom:12, fontStyle:"italic" }}>
          Tap a bottle each time you finish one. Goal is half your weight in oz <strong>({goalOz} oz/day)</strong> — {hitDays}/7 days hit.
        </div>
        {days.map((d, i) => {
          const bottles = v[i];
          const oz = bottles * bottleOz;
          const hit = bottles >= bottlesGoal;
          return (
            <div key={i} style={{ padding:"12px 0", borderBottom: i === 6 ? "none" : "1px solid "+C.line,
                                  display:"flex", alignItems:"center", justifyContent:"space-between", gap:8 }}>
              <div style={{ fontSize:13, minWidth:80 }}>
                <strong>{d.name.slice(0,3)}</strong> <span style={{ color:C.muted }}>{d.date}</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap", justifyContent:"flex-end" }}>
                {Array.from({ length: bottlesGoal }).map((_, n) => (
                  <Bottle key={n} filled={n < bottles} color={a.solid}
                          onClick={() => setN(i, n + 1 === bottles ? n : n + 1)} />
                ))}
                <span style={{ fontSize:12, color: hit ? a.solid : C.muted,
                              minWidth:60, textAlign:"right", fontVariantNumeric:"tabular-nums",
                              fontWeight: hit ? 600 : 400 }}>
                  {oz} oz {hit && "✓"}
                </span>
              </div>
            </div>
          );
        })}
      </div>
    </Section>
  );
}

/* =================== STATS =================== */
function dayHit(cat, dayValue) {
  if (cat.type === "movement" || cat.type === "check") return !!dayValue;
  if (cat.type === "slots") {
    if (!Array.isArray(dayValue)) return false;
    return dayValue.length === cat.slots.length && dayValue.every(Boolean);
  }
  if (cat.type === "water") {
    const goalOz = Math.max(1, Math.round((cat.weightLbs || 0) / 2));
    const bottleOz = Math.max(1, cat.bottleOz || 1);
    const bottlesGoal = Math.max(1, Math.ceil(goalOz / bottleOz));
    return (dayValue || 0) >= bottlesGoal;
  }
  if (cat.type === "counter") return (dayValue || 0) > 0;
  return false;
}

function Stats({ store, onBack, realCurrentWeek }) {
  const allWeeks = Object.keys(store.weeks).sort(); // oldest first
  // include the current week even if empty
  if (!allWeeks.includes(realCurrentWeek)) allWeeks.push(realCurrentWeek);
  allWeeks.sort();
  const last8 = allWeeks.slice(-8);

  return (
    <Page>
      <div style={{ maxWidth:640, margin:"0 auto" }}>

        <div style={{ background:C.card, border:"1px solid "+C.line, borderRadius:14, padding:18, marginBottom:20 }}>

}

function CategoryStats({ cat, store, weeks, allWeeks }) {
  const a = accentOf(cat);

  // streak: count consecutive days hit, walking backwards from most recent day with data
  // Combine daily series across all weeks (oldest first), then trim to today.
  const today = new Date(); today.setHours(0,0,0,0);
  const series = []; // { iso, hit }
  for (const wk of allWeeks) {
    const data = store.weeks[wk]?.[cat.id]?.values;
    const days = buildDaysForWeek(new Date(wk + "T00:00:00"));
    for (let i = 0; i < 7; i++) {
      const d = new Date(days[i].iso + "T00:00:00");
      if (d > today) continue;
      const hit = data ? dayHit(cat, data[i]) : false;
      series.push({ iso: days[i].iso, hit });
    }
  }
  // current streak (from end backwards)
  let currentStreak = 0;
  for (let i = series.length - 1; i >= 0; i--) {
    if (series[i].hit) currentStreak++; else break;
  }
  // best streak ever
  let best = 0, run = 0;
  for (const s of series) { if (s.hit) { run++; best = Math.max(best, run); } else run = 0; }
  // total
  const totalHits = series.filter(s => s.hit).length;
  const totalDays = series.length || 1;

  return (
    <div style={{ background:C.card, border:"1px solid "+C.line, borderRadius:14, marginBottom:20, overflow:"hidden" }}>
      <div style={{ height:6, background:a.solid }} />
      <div style={{ padding:"14px 16px 12px", background:a.soft, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <h3 style={{ margin:0, fontSize:15, fontWeight:600, color:C.ink }}>{cat.name}</h3>
        <span style={{ fontSize:11, color:C.inkSoft, letterSpacing:1, textTransform:"uppercase", fontWeight:600 }}>
          {totalHits} / {totalDays} days
        </span>
      </div>

      <div style={{ padding:"14px 16px 6px", display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
        <Stat label="Current streak" value={currentStreak} suffix={currentStreak === 1 ? "day" : "days"} accent={a}/>
        <Stat label="Best streak" value={best} suffix={best === 1 ? "day" : "days"} accent={a}/>
        <Stat label="Hit rate" value={Math.round((totalHits/totalDays)*100)} suffix="%" accent={a}/>
      </div>

      <div style={{ padding:"6px 16px 14px" }}>
        <div style={{ fontSize:11, color:C.muted, letterSpacing:1, textTransform:"uppercase", marginBottom:8, fontWeight:600 }}>
          Last {weeks.length} {weeks.length === 1 ? "week" : "weeks"}
        </div>
        <Heatmap cat={cat} store={store} weeks={weeks} accent={a}/>
        <Bars cat={cat} store={store} weeks={weeks} accent={a}/>
      </div>
    </div>
  );
}

function Heatmap({ cat, store, weeks, accent }) {
  const a = accent || ACCENTS.sage;
  const cell = 18, gap = 4;
  return (
    <div style={{ overflowX:"auto" }}>
      <div style={{ display:"grid", gridTemplateColumns:`60px repeat(7, ${cell}px)`, gap, alignItems:"center" }}>
        <div />
        {DAY_SHORT.map((d, i) => (
          <div key={i} style={{ fontSize:10, color:C.muted, textAlign:"center", fontWeight:600 }}>{d}</div>
        ))}
        {weeks.map((wk) => {
          const data = store.weeks[wk]?.[cat.id]?.values;
          const days = buildDaysForWeek(new Date(wk + "T00:00:00"));
          return (
            <React.Fragment key={wk}>
              <div style={{ fontSize:10, color:C.muted, paddingRight:6, textAlign:"right", whiteSpace:"nowrap" }}>
                {days[0].date}
              </div>
              {Array.from({length:7}).map((_, i) => {
                const today = new Date(); today.setHours(0,0,0,0);
                const d = new Date(days[i].iso + "T00:00:00");
                const future = d > today;
                const hit = data ? dayHit(cat, data[i]) : false;
                return (
                  <div key={i} style={{
                    width:cell, height:cell, borderRadius:4,
                    background: future ? "transparent" : (hit ? a.solid : a.soft),
                    border: future ? "1px dashed "+C.rule : "none",
                  }} title={`${days[i].iso}${hit?" · hit":""}`} />
                );
              })}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

function Bars({ cat, store, weeks, accent }) {
  const a = accent || ACCENTS.sage;
  // % per week
  const data = weeks.map(wk => {
    const v = store.weeks[wk]?.[cat.id]?.values;
    if (!v) return { wk, pct: 0 };
    const today = new Date(); today.setHours(0,0,0,0);
    const days = buildDaysForWeek(new Date(wk + "T00:00:00"));
    let possible = 0, hits = 0;
    for (let i = 0; i < 7; i++) {
      const d = new Date(days[i].iso + "T00:00:00");
      if (d > today) continue;
      possible++;
      if (dayHit(cat, v[i])) hits++;
    }
    return { wk, pct: possible ? Math.round((hits/possible)*100) : 0, label: days[0].date };
  });

  return (
    <div style={{ marginTop:14 }}>
      <div style={{ fontSize:11, color:C.muted, letterSpacing:1, textTransform:"uppercase", marginBottom:8, fontWeight:600 }}>
        Weekly hit rate
      </div>
      <div style={{ display:"flex", alignItems:"flex-end", gap:6, height:80,
                    borderBottom:"1px solid "+C.line, paddingBottom:4 }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4, height:"100%" }}>
            <div style={{ flex:1, width:"100%", display:"flex", alignItems:"flex-end" }}>
              <div style={{ width:"100%", height:`${d.pct}%`, background:a.solid, borderRadius:"4px 4px 0 0",
                            minHeight: d.pct > 0 ? 2 : 0 }} title={`${d.pct}%`} />
            </div>
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:6, marginTop:4 }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex:1, fontSize:9, color:C.muted, textAlign:"center", fontWeight:500 }}>
            {d.label || d.wk.slice(5)}
          </div>
        ))}
      </div>
    </div>
  );
}

function labelForType(c) {
  if (c.type === "movement") return "Daily activity (one per day)";
  if (c.type === "slots")    return `Multiple slots per day · ${c.slots.length} slots`;
  if (c.type === "water")    return `Water · ${c.weightLbs || "?"} lb · ${c.bottleOz || "?"} oz bottle`;
  if (c.type === "counter")  return `Counter (up to ${c.max || 3})`;
  if (c.type === "check")    return "Daily yes/no";
  return c.type;
}

function NewCategoryForm({ onCreate, onCancel, existingCount }) {
  const [name, setName] = useState("");
  const [type, setType] = useState("check");
  const submit = () => {
    const trimmed = name.trim();
    if (!trimmed) return;
    const id = "cat_" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    const accent = ACCENT_KEYS[existingCount % ACCENT_KEYS.length];
    let cat = { id, name: trimmed, type, accent };
    if (type === "check")    cat = { ...cat, subtitle: "", icon: "heart" };
    if (type === "counter")  cat = { ...cat, subtitle: "", max: 3, icon: "coffee" };
    if (type === "slots")    cat = { ...cat, subtitle: "", slots: ["Slot 1","Slot 2","Slot 3"], slotHeaders: ["", "", ""] };
    if (type === "water")    cat = { ...cat, subtitle: "Half your weight in ounces. That's the rule.", weightLbs: 150, bottleOz: 24 };
    if (type === "movement") cat = { ...cat, subtitle: "5+ days a week",
      perDay: Array.from({length:7}).map(() => ({ label:"Move", icon:"activity" })) };
    onCreate(cat);
  };
  return (
    <div style={{ background:C.card, border:"1px solid "+C.line, padding:16, borderRadius:14 }}>
      <Field label="Name">
        <input value={name} autoFocus onChange={e => setName(e.target.value)}
               placeholder="e.g. Stretching" style={inputStyle()} />
      </Field>
      <Field label="Type">
        <select value={type} onChange={e => setType(e.target.value)} style={inputStyle()}>
          <option value="check">Daily yes/no (e.g. Read 5 min, Phone away)</option>
          <option value="counter">Counter (e.g. Coffee — up to N)</option>
          <option value="slots">Multiple slots per day (e.g. Fruit/Veg)</option>
          <option value="water">Water (weight-based)</option>
          <option value="movement">Movement (different activity per day)</option>
        </select>
      </Field>
      <div style={{ display:"flex", gap:8, marginTop:12 }}>
        <button onClick={submit} style={primaryBtn()}>Add it</button>
        <button onClick={onCancel} style={pillBtn()}>Cancel</button>
      </div>
    </div>
  );
}

  const patch = (changes) => updateCategories(cs => cs.map(c => c.id === catId ? { ...c, ...changes } : c));
  const a = accentOf(cat);

  return (
    <Page>
      <div style={{ maxWidth:640, margin:"0 auto" }}>
        <TopBar onBack={onBack} title={cat.name} accentColor={a.solid} />

        <div style={{ background:C.card, border:"1px solid "+C.line, padding:16, borderRadius:14 }}>
          <Field label="Name">
            <input value={cat.name} onChange={e => patch({ name: e.target.value })} style={inputStyle()} />
          </Field>

          <Field label="Color">
            <ColorPicker value={cat.accent} onChange={(v) => patch({ accent: v })} />
          </Field>

          <Field label="Subtitle (small text shown under the title)">
            <input value={cat.subtitle || ""} onChange={e => patch({ subtitle: e.target.value })}
                   placeholder="(optional)" style={inputStyle()} />
          </Field>

          {cat.type === "counter" && (
            <>
              <Field label="Max per day">
                <input type="number" min="1" max="20" value={cat.max}
                       onChange={e => patch({ max: clampInt(e.target.value, 1, 20, 3) })}
                       style={inputStyle()} />
              </Field>
              <Field label="Icon">
                <IconPicker value={cat.icon} onChange={v => patch({ icon: v })} accent={a}/>
              </Field>
            </>
          )}

          {cat.type === "check" && (
            <Field label="Icon">
              <IconPicker value={cat.icon} onChange={v => patch({ icon: v })} accent={a}/>
            </Field>
          )}

          {cat.type === "water" && (
            <>
              <Field label="Your weight (lbs)">
                <input type="number" min="40" max="500" value={cat.weightLbs}
                       onChange={e => patch({ weightLbs: clampInt(e.target.value, 40, 500, 150) })}
                       style={inputStyle()} />
                <div style={hintStyle()}>
                  Daily goal = weight ÷ 2 oz. Right now: <strong>{Math.round((cat.weightLbs||0)/2)} oz/day</strong>.
                </div>
              </Field>
              <Field label="Water bottle size (oz)">
                <input type="number" min="4" max="128" value={cat.bottleOz}
                       onChange={e => patch({ bottleOz: clampInt(e.target.value, 4, 128, 24) })}
                       style={inputStyle()} />
                <div style={hintStyle()}>
                  Bottles to fill per day:{" "}
                  <strong>{Math.max(1, Math.ceil(((cat.weightLbs||0)/2) / Math.max(1, cat.bottleOz||1)))}</strong>
                </div>
              </Field>
            </>
          )}

          {cat.type === "slots" && (
            <Field label="Slots (header above + button label)">
              <SlotsEditor slots={cat.slots} headers={cat.slotHeaders || cat.slots.map(()=>"")}
                           onChange={(slots, headers) => patch({ slots, slotHeaders: headers })} />
            </Field>
          )}

          {cat.type === "movement" && (
            <Field label="Activity for each day of the week">
              <PerDayEditor perDay={cat.perDay} onChange={(perDay) => patch({ perDay })} accent={a}/>
            </Field>
          )}
        </div>
      </div>
    </Page>
  );
}

function ColorPicker({ value, onChange }) {
  return (
    <div style={{ display:"flex", gap:8 }}>
      {ACCENT_KEYS.concat("ink").map(k => {
        const on = value === k;
        const swatch = ACCENTS[k].solid;
        return (
          <button key={k} onClick={() => onChange(k)} title={k}
                  style={{ width:36, height:36, padding:0, borderRadius:"50%",
                           border: on ? "3px solid "+C.ink : "1px solid "+C.rule,
                           background: swatch, cursor:"pointer" }} />
        );
      })}
    </div>
  );
}

function SlotsEditor({ slots, headers, onChange }) {
  const setSlot = (i, v) => onChange(slots.map((s, idx) => idx === i ? v : s), headers);
  const setHeader = (i, v) => onChange(slots, headers.map((h, idx) => idx === i ? v : h));
  const add = () => onChange([...slots, "Slot " + (slots.length + 1)], [...headers, ""]);
  const remove = (i) => onChange(slots.filter((_, idx) => idx !== i), headers.filter((_, idx) => idx !== i));
  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 36px", gap:6, marginBottom:6 }}>
        <div style={{ fontSize:10, color:C.muted, letterSpacing:1, textTransform:"uppercase", fontWeight:600 }}>Header (above)</div>
        <div style={{ fontSize:10, color:C.muted, letterSpacing:1, textTransform:"uppercase", fontWeight:600 }}>Button label</div>
        <div />
      </div>
      {slots.map((s, i) => (
        <div key={i} style={{ display:"grid", gridTemplateColumns:"1fr 1fr 36px", gap:6, marginBottom:6 }}>
          <input value={headers[i] || ""} onChange={e => setHeader(i, e.target.value)}
                 placeholder="(optional)" style={inputStyle()} />
          <input value={s} onChange={e => setSlot(i, e.target.value)} style={inputStyle()} />
          <button onClick={() => remove(i)} disabled={slots.length <= 1}
                  style={{ ...pillBtn(), padding:"6px", opacity: slots.length <= 1 ? 0.4 : 1 }}>
            <IconTrash size={14} color={C.muted}/>
          </button>
        </div>
      ))}
      <button onClick={add} style={{ ...pillBtn(), marginTop:4, display:"inline-flex", alignItems:"center", gap:6 }}>
        <IconPlus size={14} color={C.muted}/> Add slot
      </button>
    </div>
  );
}

function PerDayEditor({ perDay, onChange, accent }) {
  const set = (i, key, val) => onChange(perDay.map((d, idx) => idx === i ? { ...d, [key]: val } : d));
  return (
    <div>
      {DAY_NAMES.map((name, i) => {
        const d = perDay[i] || { label:"", icon:"activity" };
        return (
          <div key={i} style={{ borderBottom:"1px solid "+C.line, padding:"10px 0" }}>
            <div style={{ fontSize:12, fontWeight:600, color:C.ink, marginBottom:6 }}>{name}</div>
            <input value={d.label} placeholder="Activity (e.g. Hike)"
                   onChange={e => set(i, "label", e.target.value)} style={{ ...inputStyle(), marginBottom:6 }} />
            <IconPicker value={d.icon} onChange={(v) => set(i, "icon", v)} accent={accent}/>
          </div>
        );
      })}
    </div>
  );
}

function IconPicker({ value, onChange, accent }) {
  const a = accent || ACCENTS.sage;
  return (
    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
      {ICON_CHOICES.map(k => {
        const I = ICONS[k];
        const active = value === k;
        return (
          <button key={k} onClick={() => onChange(k)}
                  style={{ width:36, height:36, padding:0,
                           border:"1px solid "+(active ? a.solid : C.rule),
                           background: active ? a.solid : "transparent",
                           borderRadius:8, cursor:"pointer", display:"inline-flex",
                           alignItems:"center", justifyContent:"center" }}>
            <I size={18} color={active ? a.onSolid : C.muted} />
          </button>
        );
      })}
    </div>
  );
}

/* =================== SHARED =================== */
function Page({ children }) {
  return (
    <div style={{
      minHeight:"100vh",
      background:`linear-gradient(180deg, ${C.bgTop} 0%, ${C.bgBot} 100%)`,
      color:C.ink, padding:"32px 20px",
    }}>{children}</div>
  );
}

function TopBar({ onBack, title, accentColor }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
      <button onClick={onBack} style={{ ...pillBtn(), display:"inline-flex", alignItems:"center", gap:6 }}>
        <IconArrowLeft size={14} color={C.muted}/> Back
      </button>
      {accentColor && <span style={{ width:6, height:28, borderRadius:3, background:accentColor }} />}
      <h1 style={{ margin:0, fontSize:20, fontWeight:600, color:C.ink }}>{title}</h1>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div style={{ marginBottom:14 }}>
      <div style={{ fontSize:11, color:C.muted, letterSpacing:1, textTransform:"uppercase", marginBottom:6, fontWeight:600 }}>{label}</div>
      {children}
    </div>
  );
}

function inputStyle() {
  return { width:"100%", padding:"10px 12px", border:"1px solid "+C.rule,
           background:"#fffdf7", borderRadius:8, fontSize:14, color:C.ink, boxSizing:"border-box",
           fontFamily:"inherit" };
}
function pillBtn() {
  return { padding:"8px 12px", border:"1px solid "+C.rule, background:C.card,
           borderRadius:999, color:C.muted, fontSize:11, letterSpacing:1, textTransform:"uppercase",
           cursor:"pointer", fontWeight:600 };
}
function iconBtn() {
  return { padding:"8px", border:"1px solid "+C.rule, background:C.card,
           borderRadius:999, color:C.muted, cursor:"pointer", display:"inline-flex",
           alignItems:"center", justifyContent:"center", width:32, height:32 };
}
function primaryBtn() {
  return { padding:"10px 16px", border:"none", background:C.sage, color:"#fffdf7",
           borderRadius:999, fontSize:12, letterSpacing:1, textTransform:"uppercase", cursor:"pointer", fontWeight:600 };
}
function hintStyle() { return { fontSize:12, color:C.muted, marginTop:6, fontStyle:"italic" }; }
function clampInt(v, min, max, fb) {
  const n = parseInt(v, 10);
  if (isNaN(n)) return fb;
  return Math.max(min, Math.min(max, n));
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
