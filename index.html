const IconPlus = (p) => <Icon {...p} d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>}/>;

const IconChart = (p) => <Icon {...p} d={<><line x1="3" y1="3" x2="3" y2="21"/><line x1="3" y1="21" x2="21" y2="21"/><polyline points="7 14 11 10 14 13 20 6"/></>}/>;
const IconSun = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M5 5l1.5 1.5"/><path d="M17.5 17.5L19 19"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M5 19l1.5-1.5"/><path d="M17.5 6.5L19 5"/></>}/>;
const IconLeaf = (p) => <Icon {...p} d={<><path d="M11 20A7 7 0 0 1 4 13c0-5 4-9 9-9a9 9 0 0 1 8 8c0 4-3 8-7 8z"/><path d="M2 22s2-4 9-7"/></>}/>;
const IconHeart = (p) => <Icon {...p} d={<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>}/>;

const ICONS = {
  activity: IconActivity, waves: IconWaves, mountain: IconMountain, wind: IconWind,
  coffee: IconCoffee, book: IconBook, moon: IconMoon, sun: IconSun, leaf: IconLeaf, heart: IconHeart,
};
const ICON_CHOICES = Object.keys(ICONS);

/* ---------- Date helpers ---------- */
function startOfWeek(date = new Date()) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return d;
}
function fmtMonthDay(d) { return d.toLocaleDateString("en-US", { month:"short", day:"numeric" }); }
function weekKey(date) { return startOfWeek(date).toISOString().slice(0,10); }
function shiftWeek(wkKey, byDays) {
  const d = new Date(wkKey + "T00:00:00");
  d.setDate(d.getDate() + byDays);
  return weekKey(d);
}
function buildDaysForWeek(weekStart) {
  return DAY_NAMES.map((name, i) => {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    return { name, date: fmtMonthDay(d), iso: d.toISOString().slice(0,10) };
  });
}

/* ---------- Color palette — NARI-inspired ---------- */
const C = {
  bg:      "#f6f3ec",
  bgAlt:   "#ffffff",
  card:    "#ffffff",
  ink:     "#1a1a1a",
  inkSoft: "#3d3d3d",
  muted:   "#8a8580",
  line:    "#e6e0d4",
  rule:    "#c8c0b0",
};
const ACCENTS = {
  orange:   { solid: "#d8542d", soft: "#f4d4c5", onSolid: "#fafaf5" },
  brown:    { solid: "#8b5e3c", soft: "#dcc4b3", onSolid: "#fafaf5" },
  mustard:  { solid: "#d8b033", soft: "#f0e0a8", onSolid: "#1a1a1a" },
  olive:    { solid: "#8c8e3e", soft: "#dcdcaa", onSolid: "#fafaf5" },
  sky:      { solid: "#88a8c0", soft: "#d5e0e9", onSolid: "#1a1a1a" },
  lavender: { solid: "#b5c1d6", soft: "#e3e8ef", onSolid: "#1a1a1a" },
  pink:     { solid: "#e89bb0", soft: "#f8e0e7", onSolid: "#1a1a1a" },
  ink:      { solid: "#1a1a1a", soft: "#e0e0e0", onSolid: "#fafaf5" },
};
const ACCENT_KEYS = ["orange","mustard","olive","sky","brown","pink","lavender","ink"];
function accentOf(cat) { return ACCENTS[cat?.accent] || ACCENTS.olive; }

/* ---------- Exercises ---------- */
const PRESET_EXERCISES = [
  { label: "Walking",    icon: "waves" },
  { label: "Hiking",     icon: "mountain" },
  { label: "Pilates",    icon: "activity" },
  { label: "Running",    icon: "activity" },
  { label: "Yoga",       icon: "leaf" },
  { label: "Swimming",   icon: "waves" },
  { label: "Cycling",    icon: "activity" },
  { label: "Weights",    icon: "activity" },
  { label: "Dancing",    icon: "heart" },
  { label: "Stretching", icon: "leaf" },
  { label: "Climbing",   icon: "mountain" },
  { label: "Surfing",    icon: "waves" },
];
function derivePerDay(exercises) {
  const exs = exercises && exercises.length ? exercises : [{ label:"Move", icon:"activity" }];
  return Array.from({ length:7 }, (_, i) => ({ ...exs[i % exs.length] }));
}

/* ---------- Defaults ---------- */
function defaultCategories() {
  const exercises = [
    { label: "Walking", icon: "waves" },
    { label: "Hiking",  icon: "mountain" },
    { label: "Pilates", icon: "activity" },
  ];
  return [
    {
      id: "movement", name: "Movement", type: "movement",
      subtitle: "5+ days a week, however feels good",
      accent: "olive",
      exercises,
      perDay: derivePerDay(exercises),
    },
    {
      id: "water", name: "Water", type: "water",
      subtitle: "half your weight in ounces. that's the rule.",
      accent: "sky",
      weightLbs: 150, bottleOz: 24,
    },
    {
      id: "reading", name: "Reading", type: "check",
      subtitle: "5 minutes a day. quiets the mind.",
      accent: "mustard",
      icon: "book",
    },
  ];
}

function defaultDataFor(cat) {
  switch (cat.type) {
    case "movement":
    case "check":   return { values: Array(7).fill(false) };
    case "slots":   return { values: Array(7).fill(0).map(() => cat.slots.map(() => false)) };
    case "water":   return { values: Array(7).fill(0) };
    case "counter": return { values: Array(7).fill(0) };
    default:        return { values: Array(7).fill(null) };
  }
}

function ensureWeek(store, wk) {
  if (!store.weeks[wk]) {
    store.weeks[wk] = {};
    for (const c of store.categories) store.weeks[wk][c.id] = defaultDataFor(c);
  } else {
    for (const c of store.categories) {
      if (!store.weeks[wk][c.id]) store.weeks[wk][c.id] = defaultDataFor(c);
    }
  }
  return store;
}

function freshStore() {
  return { categories: [], weeks: {}, onboarded: false };
}

function loadStore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return freshStore();
    const s = JSON.parse(raw);
    if (!s.categories || !s.weeks) return freshStore();
    for (const c of s.categories) {
      if (!c.accent || !ACCENTS[c.accent]) c.accent = ACCENT_KEYS[Math.floor(Math.random()*ACCENT_KEYS.length)];
    }
    if (s.onboarded) ensureWeek(s, weekKey(new Date()));
    return s;
  } catch (e) { return freshStore(); }
}

function saveStore(store) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); } catch (e) {}
}

/* =================== APP =================== */
function App() {
  const [store, setStore] = useState(null);
  const [view, setView] = useState("home");
  const [editingId, setEditingId] = useState(null);
  const [viewingWeek, setViewingWeek] = useState(weekKey(new Date()));
  const realCurrentWeek = weekKey(new Date());

  useEffect(() => { setStore(loadStore()); }, []);
  useEffect(() => { if (store) saveStore(store); }, [store]);

  if (!store) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", color:C.muted }}>
      loading…
    </div>
  );

  if (!store.onboarded) {
    return <Onboarding onComplete={(cats) => {
      setStore(s => {
        const next = { ...s, categories: cats, weeks: {}, onboarded: true };
        ensureWeek(next, realCurrentWeek);
        return next;
      });
      setView("home");
    }}/>;
  }

  const data = store.weeks[viewingWeek] || {};
  const days = buildDaysForWeek(new Date(viewingWeek + "T00:00:00"));

  const goToWeek = (wk) => {
    setStore(s => {
      const next = { ...s, weeks: { ...s.weeks } };
      ensureWeek(next, wk);
      return next;
    });
    setViewingWeek(wk);
  };
  const updateData = (catId, fn) => {
    setStore(s => {
      const next = { ...s, weeks: { ...s.weeks } };
      ensureWeek(next, viewingWeek);
      next.weeks[viewingWeek] = { ...next.weeks[viewingWeek] };
      next.weeks[viewingWeek][catId] = fn(next.weeks[viewingWeek][catId]);
      return next;
    });
  };
  const updateCategories = (fn) => {
    setStore(s => {
      const cats = fn(s.categories);
      const wkData = { ...s.weeks[viewingWeek] };
      for (const c of cats) if (!wkData[c.id]) wkData[c.id] = defaultDataFor(c);
      for (const id of Object.keys(wkData)) {
        if (!cats.find(c => c.id === id)) delete wkData[id];
      }
      return { ...s, categories: cats, weeks: { ...s.weeks, [viewingWeek]: wkData } };
    });
  };
  const resetWeek = () => {
    if (!confirm("wipe this week clean and start fresh?")) return;
    setStore(s => {
      const fresh = {};
      for (const c of s.categories) fresh[c.id] = defaultDataFor(c);
      return { ...s, weeks: { ...s.weeks, [viewingWeek]: fresh } };
    });
  };

  if (view === "settings")      return <Settings store={store} updateCategories={updateCategories} onBack={() => setView("home")} onEdit={(id) => { setEditingId(id); setView("category-edit"); }}/>;
  if (view === "category-edit") return <CategoryEditor store={store} catId={editingId} updateCategories={updateCategories} onBack={() => setView("settings")}/>;
  if (view === "stats")         return <Stats store={store} onBack={() => setView("home")} realCurrentWeek={realCurrentWeek}/>;
  if (view === "about")         return <About onBack={() => setView("home")}/>;
  return <Home store={store} days={days} data={data}
               viewingWeek={viewingWeek} realCurrentWeek={realCurrentWeek}
               goToWeek={goToWeek} updateData={updateData}
               onSettings={() => setView("settings")}
               onStats={() => setView("stats")}
               onAbout={() => setView("about")}
               onReset={resetWeek}/>;
}

/* =================== ONBOARDING =================== */
function Onboarding({ onComplete }) {
  const [step, setStep] = useState("welcome");
  const [cats, setCats] = useState(defaultCategories());

  if (step === "welcome") {
    return (
      <Page>
        <div style={{ maxWidth:480, margin:"60px auto", padding:"0 8px" }}>
          <ColorBlocks/>
          <h1 style={wordmarkStyle(39)}>PIKER</h1>
          <p style={{ textAlign:"center", color:C.muted, fontSize:13, marginTop:10, letterSpacing:"0.02em" }}>
            track your week. don't be a piker!
          </p>

          <div style={{ height:32 }}/>

          <div style={cardStyle()}>
            <p style={paraStyle()}>
              piker is a really simple way to track the little things you're trying to do each week.
            </p>
            <p style={paraStyle()}>
              did i drink enough water this week? did i move my body? did i do the things i said i would do?
            </p>
            <p style={{ ...paraStyle(), marginBottom:0 }}>
              that's it. that's the whole app!
            </p>
          </div>

          <div style={{ marginTop:24, textAlign:"center" }}>
            <button onClick={() => setStep("setup")} style={primaryBtn()}>let's set up my week →</button>
          </div>
        </div>
      </Page>
    );
  }

  const update = (id, changes) => setCats(cs => cs.map(c => c.id === id ? { ...c, ...changes } : c));
  const remove = (id) => setCats(cs => cs.filter(c => c.id !== id));
  const addCustom = () => {
    const id = "cat_" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    const accent = ACCENT_KEYS[cats.length % ACCENT_KEYS.length];
    setCats([...cats, { id, name: "New habit", type: "check", accent, subtitle: "", icon: "heart" }]);
  };

  const movement = cats.find(c => c.type === "movement");
  const movementOk = !movement || (movement.exercises && movement.exercises.length === 3);
  const canContinue = cats.length >= 3 && movementOk;

  return (
    <Page>
      <div style={{ maxWidth:560, margin:"40px auto", padding:"0 8px" }}>
        <button onClick={() => setStep("welcome")} style={{ ...textBtn(), marginBottom:16 }}>
          ← back
        </button>
        <h1 style={{ fontSize:22, fontWeight:700, margin:"0 0 4px", letterSpacing:"-0.01em" }}>
          set up your week
        </h1>
        <p style={{ fontSize:12, color:C.muted, margin:"0 0 24px" }}>
          start with at least 3 things to track. you can edit anytime.
        </p>

        {cats.map((cat) => (
          <OnboardingCard key={cat.id} cat={cat}
                          onChange={(changes) => update(cat.id, changes)}
                          onRemove={() => remove(cat.id)}
                          canRemove={cats.length > 1}/>
        ))}

        <div style={{ marginBottom:20 }}>
          <button onClick={addCustom} style={{ ...secondaryBtn(), width:"100%" }}>
            + add another habit
          </button>
        </div>

        <div style={{ marginTop:32, textAlign:"center" }}>
          <button onClick={() => onComplete(cats)} disabled={!canContinue}
                  style={{ ...primaryBtn(), opacity: canContinue ? 1 : 0.4, cursor: canContinue ? "pointer" : "not-allowed" }}>
            start tracking →
          </button>
          {!canContinue && (
            <div style={{ fontSize:11, color:C.muted, marginTop:10 }}>
              {cats.length < 3 ? "add at least 3 habits to continue" : "pick 3 favorite exercises to continue"}
            </div>
          )}
        </div>
      </div>
    </Page>
  );
}

function OnboardingCard({ cat, onChange, onRemove, canRemove }) {
  const a = accentOf(cat);
  return (
    <div style={{ background:C.card, border:"1px solid "+C.line, marginBottom:14, overflow:"hidden" }}>
      <div style={{ background:a.solid, padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <span style={{ fontSize:11, fontWeight:700, color:a.onSolid, letterSpacing:"0.12em", textTransform:"uppercase" }}>
          {labelForType(cat)}
        </span>
        <button onClick={onRemove} disabled={!canRemove} title="remove"
                style={{ background:"transparent", border:"none", padding:4, cursor: canRemove ? "pointer" : "not-allowed",
                         opacity: canRemove ? 0.85 : 0.3, display:"inline-flex", color:a.onSolid }}>
          <IconTrash size={14} color={a.onSolid}/>
        </button>
      </div>
      <div style={{ padding:"14px 16px" }}>
        <Field label="name">
          <input value={cat.name} onChange={e => onChange({ name: e.target.value })}/>
        </Field>
        <Field label="color">
          <ColorPicker value={cat.accent} onChange={(v) => onChange({ accent: v })}/>
        </Field>

        {cat.type === "movement" && (
          <Field label="pick 3 favorite exercises">
            <ExercisePicker
              value={cat.exercises || []}
              onChange={(exs) => onChange({ exercises: exs, perDay: derivePerDay(exs) })}
              accent={a}/>
          </Field>
        )}

        {cat.type === "water" && (
          <>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
              <Field label="your weight (lbs)">
                <NumberInput value={cat.weightLbs} min={40} max={500} fallback={150}
                             onChange={(v) => onChange({ weightLbs: v })}/>
              </Field>
              <Field label="bottle size (oz)">
                <NumberInput value={cat.bottleOz} min={4} max={128} fallback={24}
                             onChange={(v) => onChange({ bottleOz: v })}/>
              </Field>
            </div>
            <div style={hintStyle()}>
              goal: {Math.round((cat.weightLbs||0)/2)} oz/day
              {" · "}
              {Math.max(1, Math.floor(((cat.weightLbs||0)/2) / Math.max(1, cat.bottleOz||1)))} bottles
            </div>
          </>
        )}

        {(cat.type === "check" || cat.type === "counter") && (
          <Field label="note (optional)">
            <input value={cat.subtitle || ""} placeholder="(optional)"
                   onChange={e => onChange({ subtitle: e.target.value })}/>
          </Field>
        )}
      </div>
    </div>
  );
}

/* =================== EXERCISE PICKER =================== */
function ExercisePicker({ value, onChange, accent }) {
  const a = accent || ACCENTS.olive;
  const [custom, setCustom] = useState("");

  const isSelected = (label) => value.some(v => v.label.toLowerCase() === label.toLowerCase());
  const togglePreset = (preset) => {
    if (isSelected(preset.label)) {
      onChange(value.filter(v => v.label.toLowerCase() !== preset.label.toLowerCase()));
    } else if (value.length < 3) {
      onChange([...value, preset]);
    }
  };
  const addCustom = () => {
    const trimmed = custom.trim();
    if (!trimmed || isSelected(trimmed) || value.length >= 3) return;
    onChange([...value, { label: trimmed, icon: "activity" }]);
    setCustom("");
  };

  // preset list to show — include any custom values not in PRESET_EXERCISES at the top
  const customSelected = value.filter(v => !PRESET_EXERCISES.find(p => p.label.toLowerCase() === v.label.toLowerCase()));
  const allChips = [...customSelected, ...PRESET_EXERCISES];

  return (
    <div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:10 }}>
        {allChips.map((ex) => {
          const on = isSelected(ex.label);
          const dim = !on && value.length >= 3;
          return (
            <button key={ex.label} onClick={() => togglePreset(ex)}
                    disabled={dim}
                    style={{
                      padding:"7px 12px",
                      border:"1px solid "+(on ? a.solid : C.rule),
                      background: on ? a.solid : "transparent",
                      color: on ? a.onSolid : (dim ? C.muted : C.ink),
                      fontSize:12, fontWeight: on ? 700 : 500,
                      cursor: dim ? "not-allowed" : "pointer",
                      opacity: dim ? 0.5 : 1,
                      letterSpacing:"0.02em",
                      borderRadius:0,
                    }}>
              {ex.label}
            </button>
          );
        })}
      </div>

      <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:8 }}>
        <input value={custom} onChange={e => setCustom(e.target.value)}
               placeholder="or type your own…"
               onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); addCustom(); } }}
               disabled={value.length >= 3}
               style={{ flex:1, opacity: value.length >= 3 ? 0.5 : 1 }}/>
        <button onClick={addCustom} disabled={!custom.trim() || value.length >= 3}
                style={{ ...pillBtn(), opacity:(!custom.trim() || value.length >= 3) ? 0.4 : 1 }}>
          add
        </button>
      </div>

      <div style={{ fontSize:10, color:C.muted, letterSpacing:"0.1em", textTransform:"uppercase", fontWeight:700 }}>
        {value.length} / 3 picked
      </div>
    </div>
  );
}

/* =================== NUMBER INPUT (forgiving) =================== */
function NumberInput({ value, onChange, min, max, fallback, ...rest }) {
  const [local, setLocal] = useState(String(value ?? ""));
  useEffect(() => { setLocal(String(value ?? "")); }, [value]);
  const commit = () => {
    const n = parseInt(local, 10);
    if (isNaN(n)) {
      onChange(fallback);
      setLocal(String(fallback));
    } else {
      const clamped = Math.max(min, Math.min(max, n));
      onChange(clamped);
      setLocal(String(clamped));
    }
  };
  return (
    <input type="number" inputMode="numeric"
           value={local}
           onChange={(e) => {
             setLocal(e.target.value);
             const n = parseInt(e.target.value, 10);
             if (!isNaN(n) && n >= min && n <= max) onChange(n);
           }}
           onBlur={commit}
           {...rest}/>
  );
}

function WaterCard({ cat, days, data, update }) {
  const a = accentOf(cat);
  const goalOz = Math.max(1, Math.round((cat.weightLbs || 0) / 2));
  const bottleOz = Math.max(1, cat.bottleOz || 1);
  const bottlesGoal = Math.max(1, Math.floor(goalOz / bottleOz));
  const v = data.values;
  const hitDays = v.filter(b => b >= bottlesGoal).length;
  const setN = (i, n) => update(d => {
    const nv = [...d.values]; nv[i] = Math.max(0, Math.min(bottlesGoal + 2, n));
    return { ...d, values: nv };
  });
  return (
    <Section title={cat.name} subtitle={`${bottlesGoal} × ${bottleOz}oz · ${hitDays}/7`} accent={a}>
      <div style={{ padding:"10px 16px 16px" }}>
        <div style={{ fontSize:12, color:C.inkSoft, marginBottom:12 }}>
          tap a bottle each time you finish one. goal: <strong>{goalOz} oz/day</strong>.
        </div>
        {days.map((d, i) => {
          const bottles = v[i];
          const oz = bottles * bottleOz;
          const hit = bottles >= bottlesGoal;
          return (
            <div key={i} style={{ padding:"12px 0", borderBottom: i === 6 ? "none" : "1px solid "+C.line,
                                  display:"flex", alignItems:"center", justifyContent:"space-between", gap:8 }}>

                {Array.from({ length: bottlesGoal }).map((_, n) => (

              </div>
            </div>
          );
        })}

    </Section>
  );
}

/* =================== STATS =================== */
function dayHit(cat, dayValue) {
  if (cat.type === "movement" || cat.type === "check") return !!dayValue;
  if (cat.type === "slots") {
    if (!Array.isArray(dayValue)) return false;
    return dayValue.length === cat.slots.length && dayValue.every(Boolean);
  }
  if (cat.type === "water") {
    const goalOz = Math.max(1, Math.round((cat.weightLbs || 0) / 2));
    const bottleOz = Math.max(1, cat.bottleOz || 1);
    const bottlesGoal = Math.max(1, Math.floor(goalOz / bottleOz));
    return (dayValue || 0) >= bottlesGoal;
  }
  if (cat.type === "counter") return (dayValue || 0) > 0;
  return false;
}

  const allWeeks = Object.keys(store.weeks).sort();
  if (!allWeeks.includes(realCurrentWeek)) allWeeks.push(realCurrentWeek);

}

function CategoryStats({ cat, store, weeks, allWeeks }) {
  const a = accentOf(cat);
  const today = new Date(); today.setHours(0,0,0,0);
  const series = [];
  for (const wk of allWeeks) {
    const data = store.weeks[wk]?.[cat.id]?.values;
    const days = buildDaysForWeek(new Date(wk + "T00:00:00"));
    for (let i = 0; i < 7; i++) {
      const d = new Date(days[i].iso + "T00:00:00");
      if (d > today) continue;
      const hit = data ? dayHit(cat, data[i]) : false;
      series.push({ iso: days[i].iso, hit });
    }
  }
  let currentStreak = 0;
  for (let i = series.length - 1; i >= 0; i--) {
    if (series[i].hit) currentStreak++; else break;
  }
  let best = 0, run = 0;
  for (const s of series) { if (s.hit) { run++; best = Math.max(best, run); } else run = 0; }
  const totalHits = series.filter(s => s.hit).length;
  const totalDays = series.length || 1;

  return (
    <div style={{ background:C.card, border:"1px solid "+C.line, marginBottom:20, overflow:"hidden" }}>
      <div style={{ background:a.solid, padding:"14px 16px",
                    display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
        <h3 style={{ margin:0, fontSize:13, fontWeight:700, color:a.onSolid,
                     letterSpacing:"0.14em", textTransform:"uppercase" }}>{cat.name}</h3>
        <span style={{ fontSize:10, color:a.onSolid, opacity:0.85, letterSpacing:"0.08em",
                       textTransform:"uppercase", fontWeight:600 }}>
          {totalHits} / {totalDays} days
        </span>
      </div>

      <div style={{ padding:"14px 16px 6px", display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
        <Stat label="streak" value={currentStreak} suffix={currentStreak === 1 ? "day" : "days"} accent={a}/>
        <Stat label="best" value={best} suffix={best === 1 ? "day" : "days"} accent={a}/>
        <Stat label="hit rate" value={Math.round((totalHits/totalDays)*100)} suffix="%" accent={a}/>
      </div>

      <div style={{ padding:"6px 16px 16px" }}>
        <div style={subheadStyle({ marginTop:8, marginBottom:8 })}>last {weeks.length} {weeks.length === 1 ? "week" : "weeks"}</div>
        <Heatmap cat={cat} store={store} weeks={weeks} accent={a}/>
        <Bars cat={cat} store={store} weeks={weeks} accent={a}/>
      </div>
    </div>
  );
}

function Stat({ label, value, suffix, accent }) {
  const a = accent || ACCENTS.olive;
  return (
    <div style={{ border:"1px solid "+C.line, padding:"10px 8px", textAlign:"center" }}>
      <div style={{ fontSize:9, color:C.muted, letterSpacing:"0.14em", textTransform:"uppercase", fontWeight:700 }}>{label}</div>
      <div style={{ fontSize:22, fontWeight:700, color:a.solid, marginTop:4, fontVariantNumeric:"tabular-nums" }}>
        {value}<span style={{ fontSize:11, color:C.muted, marginLeft:3, fontWeight:500 }}>{suffix}</span>
      </div>
    </div>
  );
}

function Heatmap({ cat, store, weeks, accent }) {
  const a = accent || ACCENTS.olive;
  const cell = 18, gap = 4;
  return (
    <div style={{ overflowX:"auto" }}>
      <div style={{ display:"grid", gridTemplateColumns:`60px repeat(7, ${cell}px)`, gap, alignItems:"center" }}>
        <div/>
        {DAY_SHORT.map((d, i) => (
          <div key={i} style={{ fontSize:10, color:C.muted, textAlign:"center", fontWeight:700 }}>{d}</div>
        ))}
        {weeks.map((wk) => {
          const data = store.weeks[wk]?.[cat.id]?.values;
          const days = buildDaysForWeek(new Date(wk + "T00:00:00"));
          return (
            <React.Fragment key={wk}>
              <div style={{ fontSize:10, color:C.muted, paddingRight:6, textAlign:"right", whiteSpace:"nowrap" }}>
                {days[0].date}
              </div>
              {Array.from({length:7}).map((_, i) => {
                const today = new Date(); today.setHours(0,0,0,0);
                const d = new Date(days[i].iso + "T00:00:00");
                const future = d > today;
                const hit = data ? dayHit(cat, data[i]) : false;
                return (
                  <div key={i} style={{
                    width:cell, height:cell,
                    background: future ? "transparent" : (hit ? a.solid : a.soft),
                    border: future ? "1px dashed "+C.rule : "none",
                  }} title={`${days[i].iso}${hit?" · hit":""}`}/>
                );
              })}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

function Bars({ cat, store, weeks, accent }) {
  const a = accent || ACCENTS.olive;
  const data = weeks.map(wk => {
    const v = store.weeks[wk]?.[cat.id]?.values;
    if (!v) return { wk, pct: 0, label: wk.slice(5) };
    const today = new Date(); today.setHours(0,0,0,0);
    const days = buildDaysForWeek(new Date(wk + "T00:00:00"));
    let possible = 0, hits = 0;
    for (let i = 0; i < 7; i++) {
      const d = new Date(days[i].iso + "T00:00:00");
      if (d > today) continue;
      possible++;
      if (dayHit(cat, v[i])) hits++;
    }
    return { wk, pct: possible ? Math.round((hits/possible)*100) : 0, label: days[0].date };
  });

  return (
    <div style={{ marginTop:16 }}>
      <div style={subheadStyle({ marginBottom:8 })}>weekly hit rate</div>
      <div style={{ display:"flex", alignItems:"flex-end", gap:6, height:80,
                    borderBottom:"1px solid "+C.line, paddingBottom:4 }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", height:"100%" }}>
            <div style={{ flex:1, width:"100%", display:"flex", alignItems:"flex-end" }}>
              <div style={{ width:"100%", height:`${d.pct}%`, background:a.solid,
                            minHeight: d.pct > 0 ? 2 : 0 }} title={`${d.pct}%`}/>
            </div>
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:6, marginTop:4 }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex:1, fontSize:9, color:C.muted, textAlign:"center", fontWeight:600 }}>
            {d.label || d.wk.slice(5)}
          </div>
        ))}
      </div>
    </div>
  );
}

/* =================== SETTINGS =================== */
function Settings({ store, updateCategories, onBack, onEdit }) {
  const [adding, setAdding] = useState(false);
  return (
    <Page>
      <div style={{ maxWidth:640, margin:"0 auto" }}>
        <TopBar onBack={onBack} title="edit your tracker"/>

        <div style={{ background:C.card, border:"1px solid "+C.line }}>
          {store.categories.map((cat, idx) => {
            const a = accentOf(cat);
            return (
              <div key={cat.id}
                   style={{ padding:"14px 16px",
                            borderBottom: idx === store.categories.length - 1 ? "none" : "1px solid "+C.line,
                            display:"flex", alignItems:"center", gap:12 }}>
                <span style={{ width:8, height:30, background:a.solid, flexShrink:0 }}/>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:700, letterSpacing:"0.02em" }}>{cat.name}</div>
                  <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{labelForType(cat)}</div>
                </div>
                <button onClick={() => onEdit(cat.id)} style={pillBtn()}>edit</button>
                <button title="delete category"
                        onClick={() => {
                          if (!confirm(`delete "${cat.name}"? this removes its data for this week.`)) return;
                          updateCategories(cs => cs.filter(c => c.id !== cat.id));
                        }}
                        style={{ ...pillBtn(), color:"#a04040", borderColor:"#d4b0a0" }}>
                  <IconTrash size={12} color="#a04040"/>
                </button>
              </div>
            );
          })}
        </div>

        <div style={{ marginTop:20 }}>
          {!adding ? (
            <button onClick={() => setAdding(true)}
                    style={{ ...pillBtn(), padding:"12px 16px", display:"inline-flex", alignItems:"center", gap:8 }}>
              <IconPlus size={12} color={C.ink}/> add a habit
            </button>
          ) : (
            <NewCategoryForm
              existingCount={store.categories.length}
              onCancel={() => setAdding(false)}
              onCreate={(cat) => { updateCategories(cs => [...cs, cat]); setAdding(false); onEdit(cat.id); }}/>
          )}
        </div>

        <div style={{ marginTop:32, fontSize:11, color:C.muted, textAlign:"center" }}>
          changes save automatically.
        </div>

        <Footer/>
      </div>
    </Page>
  );
}

function labelForType(c) {
  if (c.type === "movement") return "daily activity";
  if (c.type === "slots")    return `multi-slot · ${c.slots.length} slots`;
  if (c.type === "water")    return `water · ${c.weightLbs || "?"}lb · ${c.bottleOz || "?"}oz bottle`;
  if (c.type === "counter")  return `counter (up to ${c.max || 3})`;
  if (c.type === "check")    return "daily yes/no";
  return c.type;
}

function NewCategoryForm({ onCreate, onCancel, existingCount }) {
  const [name, setName] = useState("");
  const [type, setType] = useState("check");
  const submit = () => {
    const trimmed = name.trim();
    if (!trimmed) return;
    const id = "cat_" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    const accent = ACCENT_KEYS[existingCount % ACCENT_KEYS.length];
    let cat = { id, name: trimmed, type, accent };
    if (type === "check")    cat = { ...cat, subtitle: "", icon: "heart" };
    if (type === "counter")  cat = { ...cat, subtitle: "", max: 3, icon: "coffee" };
    if (type === "slots")    cat = { ...cat, subtitle: "", slots: ["Slot 1","Slot 2","Slot 3"], slotHeaders: ["", "", ""] };
    if (type === "water")    cat = { ...cat, subtitle: "half your weight in ounces.", weightLbs: 150, bottleOz: 24 };
    if (type === "movement") {
      const exs = [{ label:"Walking", icon:"waves" },{ label:"Hiking", icon:"mountain" },{ label:"Pilates", icon:"activity" }];
      cat = { ...cat, subtitle: "5+ days a week", exercises: exs, perDay: derivePerDay(exs) };
    }
    onCreate(cat);
  };
  return (
    <div style={{ background:C.card, border:"1px solid "+C.line, padding:16 }}>
      <Field label="name">
        <input value={name} autoFocus onChange={e => setName(e.target.value)} placeholder="e.g. stretching"/>
      </Field>
      <Field label="type">
        <select value={type} onChange={e => setType(e.target.value)}>
          <option value="check">daily yes/no</option>
          <option value="counter">counter (up to N)</option>
          <option value="slots">multiple slots per day</option>
          <option value="water">water (weight-based)</option>
          <option value="movement">movement (different per day)</option>
        </select>
      </Field>
      <div style={{ display:"flex", gap:8, marginTop:12 }}>
        <button onClick={submit} style={primaryBtn()}>add it</button>
        <button onClick={onCancel} style={pillBtn()}>cancel</button>
      </div>
    </div>
  );
}

/* =================== CATEGORY EDITOR =================== */
function CategoryEditor({ store, catId, updateCategories, onBack }) {
  const cat = store.categories.find(c => c.id === catId);
  if (!cat) return <Page><TopBar onBack={onBack} title="not found"/></Page>;
  const patch = (changes) => updateCategories(cs => cs.map(c => c.id === catId ? { ...c, ...changes } : c));
  const a = accentOf(cat);

  return (
    <Page>
      <div style={{ maxWidth:640, margin:"0 auto" }}>
        <TopBar onBack={onBack} title={cat.name} accentColor={a.solid}/>

        <div style={{ background:C.card, border:"1px solid "+C.line, padding:16 }}>
          <Field label="name">
            <input value={cat.name} onChange={e => patch({ name: e.target.value })}/>
          </Field>
          <Field label="color">
            <ColorPicker value={cat.accent} onChange={(v) => patch({ accent: v })}/>
          </Field>
          <Field label="subtitle (small text shown under the title)">
            <input value={cat.subtitle || ""} onChange={e => patch({ subtitle: e.target.value })} placeholder="(optional)"/>
          </Field>

          {cat.type === "counter" && (
            <>
              <Field label="max per day">
                <NumberInput value={cat.max} min={1} max={20} fallback={3}
                             onChange={(v) => patch({ max: v })}/>
              </Field>
              <Field label="icon"><IconPicker value={cat.icon} onChange={v => patch({ icon: v })} accent={a}/></Field>
            </>
          )}

          {cat.type === "check" && (
            <Field label="icon"><IconPicker value={cat.icon} onChange={v => patch({ icon: v })} accent={a}/></Field>
          )}

          {cat.type === "water" && (
            <>
              <Field label="your weight (lbs)">
                <NumberInput value={cat.weightLbs} min={40} max={500} fallback={150}
                             onChange={(v) => patch({ weightLbs: v })}/>
                <div style={hintStyle()}>
                  daily goal = weight ÷ 2 oz. right now: <strong>{Math.round((cat.weightLbs||0)/2)} oz/day</strong>.
                </div>
              </Field>
              <Field label="water bottle size (oz)">
                <NumberInput value={cat.bottleOz} min={4} max={128} fallback={24}
                             onChange={(v) => patch({ bottleOz: v })}/>
                <div style={hintStyle()}>
                  bottles to fill per day:{" "}
                  <strong>{Math.max(1, Math.floor(((cat.weightLbs||0)/2) / Math.max(1, cat.bottleOz||1)))}</strong>
                </div>
              </Field>
            </>
          )}

          {cat.type === "slots" && (
            <Field label="slots (header above + button label)">
              <SlotsEditor slots={cat.slots} headers={cat.slotHeaders || cat.slots.map(()=>"")}
                           onChange={(slots, headers) => patch({ slots, slotHeaders: headers })}/>
            </Field>
          )}

          {cat.type === "movement" && (
            <Field label="your 3 favorite exercises">
              <ExercisePicker
                value={cat.exercises || []}
                onChange={(exs) => patch({ exercises: exs, perDay: derivePerDay(exs) })}
                accent={a}/>
            </Field>
          )}
        </div>
      </div>
    </Page>
  );
}

function ColorPicker({ value, onChange }) {
  return (
    <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
      {ACCENT_KEYS.map(k => {
        const on = value === k;
        const swatch = ACCENTS[k].solid;
        return (
          <button key={k} onClick={() => onChange(k)} title={k}
                  style={{ width:32, height:32, padding:0, borderRadius:"50%",
                           border: on ? "2px solid "+C.ink : "1px solid "+C.rule,
                           background: swatch, cursor:"pointer" }}/>
        );
      })}
    </div>
  );
}

function SlotsEditor({ slots, headers, onChange }) {
  const setSlot = (i, v) => onChange(slots.map((s, idx) => idx === i ? v : s), headers);
  const setHeader = (i, v) => onChange(slots, headers.map((h, idx) => idx === i ? v : h));
  const add = () => onChange([...slots, "Slot " + (slots.length + 1)], [...headers, ""]);
  const remove = (i) => onChange(slots.filter((_, idx) => idx !== i), headers.filter((_, idx) => idx !== i));
  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 36px", gap:8, marginBottom:6 }}>
        <div style={{ fontSize:9, color:C.muted, letterSpacing:"0.12em", textTransform:"uppercase", fontWeight:700 }}>header</div>
        <div style={{ fontSize:9, color:C.muted, letterSpacing:"0.12em", textTransform:"uppercase", fontWeight:700 }}>button label</div>
        <div/>
      </div>
      {slots.map((s, i) => (
        <div key={i} style={{ display:"grid", gridTemplateColumns:"1fr 1fr 36px", gap:8, marginBottom:6 }}>
          <input value={headers[i] || ""} onChange={e => setHeader(i, e.target.value)} placeholder="(optional)"/>
          <input value={s} onChange={e => setSlot(i, e.target.value)}/>
          <button onClick={() => remove(i)} disabled={slots.length <= 1}
                  style={{ ...pillBtn(), padding:"6px", opacity: slots.length <= 1 ? 0.4 : 1 }}>
            <IconTrash size={12} color={C.muted}/>
          </button>
        </div>
      ))}
      <button onClick={add} style={{ ...pillBtn(), marginTop:4, display:"inline-flex", alignItems:"center", gap:6 }}>
        <IconPlus size={12} color={C.ink}/> add slot
      </button>
    </div>
  );
}

function IconPicker({ value, onChange, accent }) {
  const a = accent || ACCENTS.olive;
  return (
    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
      {ICON_CHOICES.map(k => {
        const I = ICONS[k];
        const active = value === k;
        return (
          <button key={k} onClick={() => onChange(k)}
                  style={{ width:34, height:34, padding:0,
                           border:"1px solid "+(active ? a.solid : C.rule),
                           background: active ? a.solid : "transparent",
                           cursor:"pointer", display:"inline-flex",
                           alignItems:"center", justifyContent:"center" }}>
            <I size={16} color={active ? a.onSolid : C.ink}/>
          </button>
        );
      })}
    </div>
  );
}

/* =================== ABOUT =================== */
function About({ onBack }) {
  return (
    <Page>
      <div style={{ maxWidth:560, margin:"0 auto" }}>
        <TopBar onBack={onBack} title="why piker?"/>

        <div style={{ background:C.card, border:"1px solid "+C.line, padding:"28px 24px" }}>
          <h2 style={wordmarkStyle(38)}>DON'T BE A PIKER</h2>
          <div style={{ width:40, height:2, background:C.ink, margin:"18px auto 24px" }}/>

          <p style={paraStyle()}>
            Growing up, my dad had this saying. Anytime my sister and I were dragging behind on a hike, or about to give up on something, or just kind of half-trying… he'd say <strong>"come on, don't be a piker!"</strong>
          </p>
          <p style={paraStyle()}>
            A piker is someone who quits, backs down, or doesn't give it their full effort. So basically the opposite of who he wanted us to be.
          </p>
          <p style={paraStyle()}>
            I've been hearing that phrase my whole life and it still works on me. I'll be on a run about to walk and I'll hear it in my head. I'll be tempted to skip something I told myself I'd do and there it is again. <strong>DON'T BE A PIKER.</strong>
          </p>
          <p style={paraStyle()}>So I made an app.</p>
          <p style={paraStyle()}>
            I built Piker because I wanted a really simple way to track the little things I'm trying to do each week. Not life goals. Not a five-year plan. Just… did I drink enough water this week? Did I move my body? Did I do the things I said I would do?
          </p>
          <p style={{ ...paraStyle(), fontStyle:"italic", color:C.inkSoft }}>
            That's it. That's the whole app!
          </p>
          <p style={paraStyle()}>
            So this week, what are you doing? What's one tiny thing you want to actually follow through on?
          </p>
          <p style={{ ...paraStyle(), marginBottom:0 }}>
            Whatever it is, track it here. Check it off. And <strong>don't be a piker!</strong>
          </p>
        </div>

        <div style={{ textAlign:"center", marginTop:24 }}>
          <button onClick={onBack} style={primaryBtn()}>back to my week</button>
        </div>

        <Footer/>
      </div>
    </Page>
  );
}

/* =================== SHARED =================== */
function Page({ children }) {
  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.ink, padding:"32px 20px" }}>{children}</div>
  );
}

function TopBar({ onBack, title, accentColor }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:24 }}>
      <button onClick={onBack} style={{ ...pillBtn(), display:"inline-flex", alignItems:"center", gap:6 }}>
        <IconArrowLeft size={12} color={C.ink}/> back
      </button>
      {accentColor && <span style={{ width:6, height:24, background:accentColor }}/>}
      <h1 style={{ margin:0, fontSize:18, fontWeight:700, letterSpacing:"0.02em" }}>{title}</h1>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div style={{ marginBottom:16 }}>
      <div style={subheadStyle({ marginBottom:4 })}>{label}</div>
      {children}
    </div>
  );
}

function subheadStyle(extra = {}) {
  return { fontSize:10, color:C.muted, letterSpacing:"0.14em", textTransform:"uppercase", fontWeight:700, ...extra };
}

function pillBtn() {
  return { padding:"7px 12px", border:"1px solid "+C.rule, background:"transparent",
           color:C.ink, fontSize:11, letterSpacing:"0.08em", textTransform:"uppercase",
           cursor:"pointer", fontWeight:600, borderRadius:0 };
}
function iconBtn() {
  return { padding:"8px", border:"1px solid "+C.rule, background:"transparent",
           cursor:"pointer", display:"inline-flex", alignItems:"center", justifyContent:"center",
           width:34, height:34, borderRadius:0 };
}
function primaryBtn() {
  return { padding:"12px 22px", border:"none", background:C.ink, color:"#fafaf5",
           fontSize:12, letterSpacing:"0.1em", textTransform:"uppercase", cursor:"pointer", fontWeight:700,
           borderRadius:0 };
}
function secondaryBtn() {
  return { padding:"12px 18px", border:"1px solid "+C.rule, background:"transparent",
           color:C.ink, fontSize:11, letterSpacing:"0.1em", textTransform:"uppercase",
           cursor:"pointer", fontWeight:600, borderRadius:0 };
}
function textBtn() {
  return { background:"transparent", border:"none", color:C.muted, fontSize:11,
           letterSpacing:"0.08em", textTransform:"uppercase", cursor:"pointer", fontWeight:600, padding:0 };
}
function hintStyle() { return { fontSize:11, color:C.muted, marginTop:6, fontStyle:"italic" }; }
function paraStyle() { return { fontSize:14, lineHeight:1.7, color:C.ink, margin:"0 0 16px" }; }
function cardStyle() { return { background:C.card, border:"1px solid "+C.line, padding:"24px 22px" }; }

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
